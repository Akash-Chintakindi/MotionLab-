<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f5f7fb" />
    <title>MotionLab — AP Physics C Kinematics</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash of light/dark.
      (function () {
        try {
          var t = localStorage.getItem("motionlab.theme");
          var dark =
            t === "dark" ||
            ((!t || t === "system") &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var root = document.documentElement;
          if (dark) root.classList.add("dark");
          root.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
